<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Map Game</title>
    <style>
        body { margin: 0; }
        #map { width: 100%; height: 100vh; }
        .tile { width: 20px; height: 20px; display: inline-block; }
        .green { background: green; }
        .red { background: red; }
        .gray { background: gray; }
        .gold { background: gold; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    const mapSize = 50;
    const map = document.getElementById('map');

    for (let i = 0; i < mapSize; i++) {
        for (let j = 0; j < mapSize; j++) {
            const tile = document.createElement('div');
            tile.className = 'tile ' + (Math.random() < 0.5 ? 'green' : 'gray');
            map.appendChild(tile);
        }
    }

    // Add zoom and pan controls here

    // AI expansion, money system, and territory conquest logic here

</script>
</body>
</html>
